name: ShareIt API Tests

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build, Run Server & Postman Tests
    runs-on: ubuntu-latest

    steps:
      # 1) Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2) Устанавливаем JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      # 3) Кешируем Maven зависимости
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      # 4) Сборка проекта без тестов
      - name: Build project
        run: mvn clean package -DskipTests -B

      # 5) Запуск Maven JUnit тестов
      - name: Run Maven Tests
        run: mvn test -B

      # 6) Checkstyle
      - name: Run Checkstyle
        run: mvn checkstyle:check -B

      # 7) Upload результатов Maven тестов
      - name: Upload Maven Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-results
          path: '**/target/surefire-reports/*.xml'

      # 8) Запуск Spring Boot сервера через jar
      - name: Run Spring Boot Server
        run: |
          java -jar target/java-shareit-0.0.1-SNAPSHOT.jar &
          echo "Waiting for server to start..."
          for i in {1..30}; do
            nc -z localhost 8080 && break
            sleep 2
          done

      # 9) Установка Node.js для Newman
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 10) Запуск Postman коллекции через Newman
      - name: Run Postman API Tests
        run: |
          npm install -g newman
          newman run postman/sprint.json --reporters cli,junit --reporter-junit-export postman-results.xml

      # 11) Upload результатов Postman тестов
      - name: Upload Postman Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-test-results
          path: postman-results.xml
