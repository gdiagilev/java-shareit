name: ShareIt API Tests

on:
  pull_request:
    # Любые ветки, направленные в main
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Run Tests
    runs-on: ubuntu-latest

    steps:
      # 1) Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2) Устанавливаем JDK 17 (или меняем версию при обновлении проекта)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 3) Кешируем Maven зависимости для ускорения сборки
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      # 4) Сборка проекта
      - name: Build with Maven
        run: mvn clean install -B -q

      # 5) Запуск тестов
      - name: Run tests
        run: mvn test -B

      # 6) Сохраняем результаты тестов (JUnit reports)
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: '**/target/surefire-reports/*.xml'